<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creer un compte</title>
    <link rel="stylesheet" href="CSS/design.css">
</head>
<body id="main">
     <header>
        <img src="image/LOGO-CFS-300x110px.png" alt="">
    </header>
    <fieldset>
        <legend>Inscription</legend>
        <form action="">
            <fieldset>
                <legend>Information de connexion</legend>
                <table>
                    <tr>
                        <td><label for="">Adresse Electronique</label></td>
                        <td><input type="email"></td>
                    </tr>
                    <tr>
                    <td><label for="">Mot de passe</label></td>
                    <td><input type ="password"></td>
                    <tr>
                    <td><label for="">Entrer à nouveau le mot de passe</label></td>
                    <td><input type="password"></td>
                    </tr>
                </table> 
            </fieldset>
            <br>
            <fieldset>
                <legend>Information personnelles</legend>
                <table>
                    <tr>
                        <td><label for="">Civilité</label></td>
                        <td>
                            <select name="" id=""> 
                                <option value="">M.</option>
                                <option value="">Mlle.</option>
                                <option value="">Mme</option> M
                            </select>
                        </td>
                    </tr> 
                    <tr>
                        <td><label for="">Genre :</label></td>
                        <td>
                            <input type="checkbox" name="selectSexe"> <label for="">M</label><br>
                            <input type="checkbox" name="selectSexe"> <label for="">F</label>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="">Nom</label></td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td><label for="">Prénom</label></td>
                        <td><input type ="text"></td>
                    </tr>
                    <tr>
                        <td><label for="">Adresse</label></td>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <td><label for="">Ville :</label></td>
                    <td>
                        <input type="text" width="3">
                        <label for="">Code Postal</label>
                        <input type="number">
                    </td>
                    </tr>
                

                </table>
            </fieldset>
             </form>
          </fieldset>
          <br>
          <fieldset>
            <legend>Information de carte de crédit</legend>
            <table>
                <tr>
                    <td><label for="">Type de carte :</label></td>
                        <td>
                            <input type="checkbox" name="select"> <label for="">MasterCard</label><br>
                            <input type="checkbox" name="select"> <label for="">Visa</label>
                        </td>
                </tr>
                <tr>
                    <td><label for="">Numéro de carte</label></td>
                    <td><input type="number"></td>
                </tr>
                <tr>
                    <td><label for="">Date d'expiration</td>
                    <td><input type="date"></td>
                </tr>

            </table>
          </fieldset>
          <input type="submit" value="Connexion">

    
</body>
</html>
